server {
    server_name panel.aiconsultingitalia.com;
    client_max_body_size 100M;

    root /var/www/aiconsultingitalia/panel;
    index index.html index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/panel.aiconsultingitalia.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/panel.aiconsultingitalia.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = panel.aiconsultingitalia.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name panel.aiconsultingitalia.com;

    listen 80;
    return 404; # managed by Certbot


}
